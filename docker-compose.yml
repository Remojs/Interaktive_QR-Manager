services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: qr-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      # Comma-separated list of allowed frontend origins
      ALLOWED_ORIGINS: "https://interaktive-qr-manager.vercel.app"
    volumes:
      # Persist the SQLite database outside the container
      - qr_data:/app/db

volumes:
  qr_data:
